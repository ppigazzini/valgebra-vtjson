name: CI

on:
  push:
    branches: [main, github_ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  differential:
    name: differential (vtjson parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: valgebra-vtjson
      # valgebra is resolved from a sibling checkout, matching local layout.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ppigazzini/valgebra
          path: valgebra
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: valgebra
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # libmagic backs the `magic` validator's differential test.
      - run: sudo apt-get update && sudo apt-get install -y libmagic1
      - name: Sync
        working-directory: valgebra-vtjson
        run: uv sync
      - name: Lint
        working-directory: valgebra-vtjson
        run: |
          uv run ruff check
          uv run ruff format --check
          uv run ty check
      # The layer must agree with pinned vtjson on every supported construct.
      # A new divergence without a ledger entry fails here.
      - name: Differential parity against pinned vtjson
        working-directory: valgebra-vtjson
        run: uv run pytest -v
      # Smoke-run the vtjson-versus-valgebra benchmark with timing disabled so
      # the comparison suite keeps working; its numbers live in the performance
      # page. The files are named bench_*, so override the collection pattern.
      - name: Smoke-run the benchmarks
        working-directory: valgebra-vtjson
        run: >
          uv run --group bench pytest benches/
          -o python_files="bench_*.py" --benchmark-disable -q
